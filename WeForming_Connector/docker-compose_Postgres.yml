services:

  # Database (Postgres)

  connector-postgres:
    image: postgres:18.1-alpine3.23
    container_name: connector-postgres
    restart: unless-stopped
    user: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:${POSTGRES_PORT:-5432}"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB_NAME:-edc_store}
    networks:
      - weforming_connector_network
    volumes: 
      - connector-postgres:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -p ${POSTGRES_PORT:-5432} -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Connector (Connector + Identity Hub + Launcher)

  weforming-connector:
    hostname: connector
    image: ${CONNECTOR_IMAGE:-weforming-connector}
    build:
      context: ../connector/source/.
    restart: unless-stopped
    depends_on:
      connector-postgres:
        condition: service_healthy
    ports:
      - '${CONNECTOR_PORT_BASE:-8001}:${CONNECTOR_PORT_BASE:-8001}'
      - '${CONNECTOR_PORT_PUBLIC:-8002}:${CONNECTOR_PORT_PUBLIC:-8002}'
      - '${CONNECTOR_PORT_CONTROL:-8005}:${CONNECTOR_PORT_CONTROL:-8005}'
      - '${CONNECTOR_PORT_MANAGEMENT:-8003}:${CONNECTOR_PORT_MANAGEMENT:-8003}'
      - '${CONNECTOR_PORT_PROTOCOL:-8004}:${CONNECTOR_PORT_PROTOCOL:-8004}'
      - '${IH_PORT_BASE:-7001}:${IH_PORT_BASE:-7001}'
      - '${IH_PORT_CREDENTIALS:-7002}:${IH_PORT_CREDENTIALS:-7002}'
      - '${IH_PORT_IDENTITY:-7003}:${IH_PORT_IDENTITY:-7003}'
      - '${IH_PORT_DID:-7004}:${IH_PORT_DID:-7004}'
      - '${IH_PORT_VERSION:-7005}:${IH_PORT_VERSION:-7005}'
      - '${IH_PORT_STS:-7006}:${IH_PORT_STS:-7006}'
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - weforming_connector_network
    volumes:
      - ./test-keys:/keys:ro
      - ./credentials:/credentials:ro
    environment:
      # Log level

      - LOG_LEVEL=${LOG_LEVEL:-INFO}

      # Java

      - JAVA_RUNTIME_FLAGS_CONNECTOR=${JAVA_RUNTIME_FLAGS_CONNECTOR:-}
      - JAVA_RUNTIME_FLAGS_IH=${JAVA_RUNTIME_FLAGS_IH:-}

      # Identity

      - PARTICIPANT_ID=${REGISTER_PARTICIPANT_PARTICIPANT_DID}

      # Identity proxy

      - IDENTITY_PROXY_URL=${INDY_URL}
      - IDENTITY_PROXY_TOKEN=${REGISTER_PARTICIPANT_X_API_KEY}

      # Credentials

      - VC_FOLDER=/credentials
      - TRUSTED_ISSUERS=${TRUSTED_ISSUERS:-${REGISTER_PARTICIPANT_PARTICIPANT_DID}}

      # Keys

      - PUBLIC_KEY=/keys/${CONNECTOR_PUBLIC_KEY_FILE:-connector-public.pem}
      - PRIVATE_KEY=/keys/${CONNECTOR_PRIVATE_KEY_FILE:-connector-private.pem}
      - DID_PUBLIC_KEY_TYPE=${DID_PUBLIC_KEY_TYPE:-Ed25519Signature2018}

      # Wallet private key

      - DID_OWNER_PRIVATE_KEY=${WALLET_PRIVATE_KEY}

      # Ports (connector)

      - CONNECTOR_PORT_BASE=${CONNECTOR_PORT_BASE:-8001}
      - CONNECTOR_PORT_PUBLIC=${CONNECTOR_PORT_PUBLIC:-8002}
      - CONNECTOR_PORT_CONTROL=${CONNECTOR_PORT_CONTROL:-8005}
      - CONNECTOR_PORT_MANAGEMENT=${CONNECTOR_PORT_MANAGEMENT:-8003}
      - CONNECTOR_PORT_PROTOCOL=${CONNECTOR_PORT_PROTOCOL:-8004}

      # Ports (Identity Hub)

      - IH_PORT_BASE=${IH_PORT_BASE:-7001}
      - IH_PORT_CREDENTIALS=${IH_PORT_CREDENTIALS:-7002}
      - IH_PORT_IDENTITY=${IH_PORT_IDENTITY:-7003}
      - IH_PORT_DID=${IH_PORT_DID:-7004}
      - IH_PORT_VERSION=${IH_PORT_VERSION:-7005}
      - IH_PORT_STS=${IH_PORT_STS:-7006}

      # External URLs

      - CREDENTIAL_SERVICE_EXTERNAL_URL=${CREDENTIAL_SERVICE_EXTERNAL_URL:-http://localhost:7002}
      - PROTOCOL_EXTERNAL_URL=${PROTOCOL_EXTERNAL_URL:-http://localhost:8004}

      # Postgres

      - POSTGRES_HOST=${POSTGRES_HOST:-connector-postgres}
      - POSTGRES_PORT=${POSTGRES_PORT:-8432}
      - POSTGRES_DB_NAME=${POSTGRES_DB_NAME:-edc_store}
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}

      # Other secrets

      - IH_SUPER_USER_SECRET=${IH_SUPER_USER_SECRET:-super-secret-key}

  # EDC Handler

  connector-edc-handler:
    build:
      context: edc-handler
      dockerfile: Dockerfile
    image: connector-edc-handler
    container_name: connector-edc-handler
    environment:
      - JAVA_OPTS=${HANDLER_JAVA_OPTS:--Xms256m -Xmx512m}
      - DB_IP=${POSTGRES_HOST:-connector-postgres}
      - DB_PORT=${POSTGRES_PORT:-8432}
      - DB_NAME=${POSTGRES_DB_NAME:-edc_store}
      - DB_USERNAME=${POSTGRES_USER:-postgres}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - SOFIA_URI=${SOFIA_URI:-https://weforming-mid.eurodyn.com/api}
      - CONNECTOR_URI=${CONNECTOR_URI:-http://weforming-connector}
      - IDENTITYHUB_URI=${IDENTITYHUB_URI:-http://weforming-connector}
      - INDY_URL=${INDY_URL}
      - REGISTER_PARTICIPANT_X_API_KEY=${REGISTER_PARTICIPANT_X_API_KEY}
      - REGISTER_PARTICIPANT_ID=${REGISTER_PARTICIPANT_ID}
      - REGISTER_PARTICIPANT_PARTICIPANT_DID=${REGISTER_PARTICIPANT_PARTICIPANT_DID}
      - WALLET_PRIVATE_KEY=${WALLET_PRIVATE_KEY}
    networks:
      - weforming_connector_network
    volumes:
      - ./test-keys:/app/test-keys
    ports:
      - "${HANDLER_PORT:-15588}:${HANDLER_PORT:-15588}"
    restart: unless-stopped
    depends_on:
      weforming-connector:
        condition: service_started  
      connector-postgres:
        condition: service_healthy

  # Dozzle (Container log viewer)

  dozzle:
    container_name: dozzle
    image: amir20/dozzle:latest
    restart: unless-stopped
    ports:
      - "${DOZZLE_PORT:-9999}:8080"
    networks:
      - weforming_connector_network
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

# Networks

networks:
  weforming_connector_network:
    name: wf_connector_net
    driver: bridge

# Volumes

volumes:
  connector-postgres:
    driver: local
